apiVersion: v1
kind: Secret
metadata:
  name: finout-mcp-hosted-public-secret
  namespace: mcp-public
type: Opaque
stringData:
  # Base64-encoded RSA public key from Frontegg (for verifying __fnt_dd_ login cookie JWTs).
  # Only needed if you want cookie-based auth in addition to OAuth. Leave empty to disable.
  finout-login-jwt-public-key: ""
