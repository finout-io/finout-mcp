apiVersion: apps/v1
kind: Deployment
metadata:
  name: finout-mcp
  namespace: mcp-public
  labels:
    app: finout-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finout-mcp
  template:
    metadata:
      labels:
        app: finout-mcp
    spec:
      containers:
      - name: finout-mcp
        image: 277411487094.dkr.ecr.us-east-1.amazonaws.com/finout-mcp:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: MCP_HOST
          valueFrom:
            configMapKeyRef:
              name: finout-mcp-hosted-public-config
              key: mcp-host
        - name: MCP_PORT
          valueFrom:
            configMapKeyRef:
              name: finout-mcp-hosted-public-config
              key: mcp-port
        - name: FINOUT_API_URL
          valueFrom:
            configMapKeyRef:
              name: finout-mcp-hosted-public-config
              key: finout-api-url
        - name: MCP_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: finout-mcp-hosted-public-config
              key: mcp-base-url
        - name: FRONTEGG_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: finout-mcp-hosted-public-config
              key: frontegg-base-url
        - name: FRONTEGG_MCP_CLIENT_ID
          valueFrom:
            configMapKeyRef:
              name: finout-mcp-hosted-public-config
              key: frontegg-mcp-client-id
        - name: FINOUT_JWT_ISSUER
          valueFrom:
            configMapKeyRef:
              name: finout-mcp-hosted-public-config
              key: finout-jwt-issuer
        - name: FINOUT_JWT_AUDIENCE
          valueFrom:
            configMapKeyRef:
              name: finout-mcp-hosted-public-config
              key: finout-jwt-audience
        - name: FINOUT_LOGIN_JWT_PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: finout-mcp-hosted-public-secret
              key: finout-login-jwt-public-key
              optional: true
        - name: MCP_CODE_SECRET
          valueFrom:
            secretKeyRef:
              name: finout-mcp-hosted-public-secret
              key: mcp-code-secret
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
