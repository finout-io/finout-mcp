apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finout-mcp-hosted-public
  namespace: mcp-public
  annotations:
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    # CloudFront VPC origin connects to this ALB — restrict inbound to CloudFront's managed prefix list
    # and any internal CIDRs you want to allow for debugging.
    alb.ingress.kubernetes.io/security-groups: sg-0ecaa327bd4566c57   # prod-data-engine SG
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:277411487094:certificate/2bbd2a25-b995-4420-ab94-8ed88f94d57f          # cert for mcp.internal.finout.io
spec:
  ingressClassName: alb
  rules:
  - host: mcp.internal.finout.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: finout-mcp-hosted-public
            port:
              number: 80
