apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: billy

resources:
- namespace.yaml
- billy-configmap.yaml
- billy-deployment.yaml
- billy-service.yaml
- billy-ingress.yaml
- langfuse-configmap.yaml
- langfuse-clickhouse.yaml
- langfuse-redis.yaml
# - langfuse-minio.yaml  # Optional: local/dev S3-compatible storage
- langfuse-web.yaml
- langfuse-worker.yaml
- langfuse-ingress.yaml
# - billy-secret.yaml  # Uncomment after creating from .example
# - langfuse-secret.yaml  # Uncomment after creating from .example

# Common labels for all resources
labels:
- pairs:
    app.kubernetes.io/name: billy
    app.kubernetes.io/component: diagnostic-tool
    app.kubernetes.io/part-of: finout-mcp
    app.kubernetes.io/managed-by: kustomize

# Image configuration
images:
- name: 277411487094.dkr.ecr.us-east-1.amazonaws.com/billy
  newName: 277411487094.dkr.ecr.us-east-1.amazonaws.com/billy
  newTag: production
- name: langfuse/langfuse
  newName: langfuse/langfuse
  newTag: "3.157.0"
- name: langfuse/langfuse-worker
  newName: langfuse/langfuse-worker
  newTag: "3.157.0"

# ConfigMap generator (alternative to separate file)
# configMapGenerator:
# - name: billy-config
#   literals:
#   - finout-internal-api-url=http://finout-app.internal
#   - finout-default-account-id=your-account-id
