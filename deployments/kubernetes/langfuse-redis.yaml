apiVersion: v1
kind: Service
metadata:
  name: langfuse-redis
  namespace: billy
  labels:
    app: langfuse-redis
spec:
  selector:
    app: langfuse-redis
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: langfuse-redis
  namespace: billy
  labels:
    app: langfuse-redis
spec:
  serviceName: langfuse-redis
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-redis
  template:
    metadata:
      labels:
        app: langfuse-redis
    spec:
      containers:
      - name: redis
        image: redis:7
        command:
        - sh
        - -c
        - 'redis-server --requirepass "$REDIS_PASSWORD" --maxmemory-policy noeviction'
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: langfuse-secrets
              key: redis-auth
        ports:
        - containerPort: 6379
          name: redis
        volumeMounts:
        - name: redis-data
          mountPath: /data
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - 'redis-cli -a "$REDIS_PASSWORD" ping'
          initialDelaySeconds: 10
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
