apiVersion: v1
kind: ConfigMap
metadata:
  name: billy-config
  namespace: billy
  labels:
    app: billy
data:
  # Finout Internal API URL
  finout-internal-api-url: "http://finout-app.prod-mirror.internal.finout.io"

  # Optional: Log level
  log-level: "INFO"

  # Optional: Langfuse endpoint for Billy tracing
  # Keep as in-cluster service URL when Langfuse is deployed in this namespace.
  langfuse-host: "http://langfuse-web:3000"
