[project]
name = "billy"
version = "0.32.0"
description = "BILLY (Internal Diagnostic Tool)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.135.1",
    "uvicorn[standard]>=0.41.0",
    "anthropic>=0.84.0",
    "python-dotenv>=1.2.2",
    "pydantic>=2.12.5",
    "httpx>=0.28.1",
    "asyncpg>=0.31.0",
    "PyJWT[crypto]>=2.11.0",
    "langfuse>=4.0.0,<5",
    "opentelemetry-instrumentation-anthropic>=0.53.0",
]

[project.scripts]
billy = "billy.server:main"
billy-dev = "billy.dev:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/billy"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
