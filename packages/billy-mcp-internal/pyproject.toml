[project]
name = "billy-mcp-internal"
version = "0.1.0"
description = "Internal MCP launcher used by BILLY only"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "finout-mcp>=0.1.8",
]

[project.scripts]
billy-mcp-internal = "billy_mcp_internal.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/billy_mcp_internal"]
