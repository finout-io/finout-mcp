[project]
name = "finout-mcp-hosted"
version = "0.2.0"
description = "Hosted public MCP server with Frontegg OAuth — internal deployment only"
requires-python = ">=3.11"
dependencies = [
    "finout-mcp",
    "PyJWT[crypto]>=2.11.0",
    "httpx>=0.28.1",
    "starlette>=0.52.1",
    "uvicorn>=0.41.0",
    "anyio>=4.12.1",
    "python-dotenv>=1.2.2",
    "redis[hiredis]>=5.0",
    "boto3>=1.35",
]

[project.scripts]
finout-mcp-hosted = "finout_mcp_hosted.server:main"
finout-mcp-hosted-dev = "finout_mcp_hosted.server:dev"


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/finout_mcp_hosted"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "fakeredis[json]>=2.21",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
