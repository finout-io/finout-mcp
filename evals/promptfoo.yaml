description: "Billy promptfoo tool-contract evals"

commandLineOptions:
  cache: false

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      tools:
        - name: query_costs
          description: >
            Query cloud costs with flexible filters, grouping, and multi-metric support.
          input_schema:
            type: object
            properties:
              time_period:
                type: string
                description: >
                  Predefined: today, yesterday, last_7_days, last_30_days, this_month, last_month.
                  Flexible: last_N_days, last_N_weeks, last_N_months (e.g. last_14_days, last_3_months).
                  Custom: YYYY-MM-DD to YYYY-MM-DD.
                default: last_30_days
              group_by:
                type: array
                items:
                  type: object
                  properties:
                    costCenter: { type: string }
                    key: { type: string }
                    path: { type: string }
                    type: { type: string }
              x_axis_group_by:
                type: string
                enum: [hourly, daily, weekly, monthly, quarterly]
              extra_measurements:
                type: array
                items:
                  type: object
                  properties:
                    type: { type: string }
                    aggregation:
                      type: string
                      enum: [sum, avg, min, max]
              billing_metrics:
                type: array
                items:
                  type: string
                  enum: [savingsPlanEffectiveCost, reservationEffectiveCost]
              count_distinct:
                type: object
                properties:
                  costCenter: { type: string }
                  key: { type: string }
                  path: { type: string }
                  type: { type: string }
              predefined_queries:
                type: array
                items: { type: string }
        - name: compare_costs
          description: Compare total costs between two time periods.
          input_schema:
            type: object
            required: [current_period, comparison_period]
            properties:
              current_period: { type: string }
              comparison_period: { type: string }
              group_by:
                type: array
                items: { type: object }
              extra_measurements:
                type: array
                items:
                  type: object
                  properties:
                    type: { type: string }
                    aggregation:
                      type: string
                      enum: [sum, avg, min, max]
              billing_metrics:
                type: array
                items:
                  type: string
                  enum: [savingsPlanEffectiveCost, reservationEffectiveCost]
        - name: search_filters
          description: Search for filter metadata to use in query_costs.
          input_schema:
            type: object
            properties:
              query: { type: string }
        - name: get_top_movers
          description: Identify which dimensions had the biggest cost changes between two periods.
          input_schema:
            type: object
            properties:
              time_period: { type: string }
              comparison_period: { type: string }
              group_by:
                type: array
                items: { type: object }
              filters:
                type: array
                items: { type: object }
              limit: { type: integer }
        - name: get_unit_economics
          description: Compute cost per unit by counting unique resources alongside cost.
          input_schema:
            type: object
            properties:
              time_period: { type: string }
              count_dimension:
                type: object
                properties:
                  costCenter: { type: string }
                  key: { type: string }
                  path: { type: string }
                  type: { type: string }
              group_by:
                type: array
                items: { type: object }
              filters:
                type: array
                items: { type: object }
              cost_type:
                type: string
                enum: [netAmortizedCost, amortizedCost, unblendedCost, blendedCost]
        - name: get_cost_patterns
          description: Analyze hourly cost patterns such as peak hours and weekday versus weekend spend.
          input_schema:
            type: object
            properties:
              time_period:
                type: string
                description: >
                  Time period to analyze. Use explicit named periods when the user provides them.
                  Examples: "this week" -> this_week, "last 7 days" -> last_7_days,
                  "this month" -> this_month. Do not broaden "this week" to this_month.
              filters:
                type: array
                items: { type: object }
              group_by:
                type: array
                items: { type: object }
        - name: get_savings_coverage
          description: Analyze savings plan and reservation coverage.
          input_schema:
            type: object
            properties:
              time_period: { type: string }
              group_by:
                type: array
                items: { type: object }
              filters:
                type: array
                items: { type: object }
        - name: get_tag_coverage
          description: Analyze what percentage of spend is tagged by a given dimension.
          input_schema:
            type: object
            properties:
              time_period: { type: string }
              tag_dimension:
                type: object
                properties:
                  costCenter: { type: string }
                  key: { type: string }
                  path: { type: string }
                  type: { type: string }
              group_by:
                type: array
                items: { type: object }
              filters:
                type: array
                items: { type: object }
        - name: get_budget_status
          description: Compare actual spend against financial plan budgets.
          input_schema:
            type: object
            properties:
              plan_name: { type: string }
              period: { type: string }
              time_period: { type: string }
        - name: get_cost_statistics
          description: Compute daily cost statistics such as mean, peak day, and volatility.
          input_schema:
            type: object
            properties:
              time_period: { type: string }
              group_by:
                type: array
                items: { type: object }
              filters:
                type: array
                items: { type: object }
        - name: list_data_explorers
          description: List saved data explorer configurations in the account.
          input_schema:
            type: object
            properties:
              query: { type: string }

prompts:
  - "{{prompt}}"

defaultTest:
  options:
    provider: anthropic:messages:claude-sonnet-4-6

tests: file://promptfoo-tests.mjs
