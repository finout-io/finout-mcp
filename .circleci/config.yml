version: 2.1

orbs:
  aws-cli: circleci/aws-cli@5.3.2
  aws-ecr: circleci/aws-ecr@9.5.1
  node: circleci/node@5.3.0

executors:
  python:
    docker:
      - image: cimg/python:3.11

jobs:
  mcp_quality:
    executor: python
    steps:
      - checkout
      - run:
          name: Install MCP dependencies
          command: |
            python -m pip install --upgrade pip
            cd packages/mcp-server
            pip install -e .
            pip install pytest pytest-asyncio ruff mypy
      - run:
          name: Ruff
          command: |
            cd packages/mcp-server
            ruff check .
            ruff format --check .
      - run:
          name: Mypy
          command: |
            cd packages/mcp-server
            mypy src
      - run:
          name: Pytest
          command: |
            cd packages/mcp-server
            pytest -q

  billy_quality:
    docker:
      - image: cimg/node:20.19
    steps:
      - checkout
      - run:
          name: Python compile check
          command: |
            python3 -m py_compile \
              packages/billy/src/billy/server.py \
              packages/billy/src/billy/db.py \
              packages/billy/src/billy/dev.py
      - run:
          name: Install pnpm
          command: corepack prepare pnpm@latest --activate
      - node/install-packages:
          pkg-manager: pnpm
          app-dir: packages/billy/frontend
      - run:
          name: Build frontend
          command: |
            cd packages/billy/frontend
            pnpm build

  build_python_packages:
    executor: python
    steps:
      - checkout
      - run:
          name: Build package distributions
          command: |
            python -m pip install --upgrade pip build
            mkdir -p dist/mcp-server dist/billy dist/billy-mcp-internal
            python -m build packages/mcp-server --outdir dist/mcp-server
            python -m build packages/billy --outdir dist/billy
            python -m build packages/billy-mcp-internal --outdir dist/billy-mcp-internal
      - persist_to_workspace:
          root: .
          paths:
            - dist
      - store_artifacts:
          path: dist

  smoke_test_python_packages:
    executor: python
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Smoke test public package
          command: |
            python -m venv /tmp/public-mcp
            /tmp/public-mcp/bin/pip install --upgrade pip
            /tmp/public-mcp/bin/pip install dist/mcp-server/*.whl
            /tmp/public-mcp/bin/finout-mcp --help
      - run:
          name: Smoke test internal package
          command: |
            python -m venv /tmp/internal-mcp
            /tmp/internal-mcp/bin/pip install --upgrade pip
            /tmp/internal-mcp/bin/pip install dist/mcp-server/*.whl dist/billy-mcp-internal/*.whl
            /tmp/internal-mcp/bin/billy-mcp-internal --help

  build_and_push_billy_image:
    machine:
      image: ubuntu-2004:2024.05.1
    steps:
      - checkout
      - aws-ecr/build_and_push_image:
          account_id: ${AWS_ACCOUNT_ID}
          checkout: false
          create_repo: true
          dockerfile: packages/billy/Dockerfile
          repo: billy
          skip_when_tags_exist: false
          tag: '${CIRCLE_SHA1:0:7},${CIRCLE_BRANCH//\//-}'
          extra_build_args: "--platform=linux/amd64"
          auth:
            - aws-cli/setup:
                region: ${AWS_DEFAULT_REGION}

  build_and_push_hosted_public_image:
    machine:
      image: ubuntu-2004:2024.05.1
    steps:
      - checkout
      - aws-ecr/build_and_push_image:
          account_id: ${AWS_ACCOUNT_ID}
          checkout: false
          create_repo: true
          dockerfile: Dockerfile.mcp-hosted-public
          repo: finout-mcp
          skip_when_tags_exist: false
          tag: '${CIRCLE_SHA1:0:7},${CIRCLE_BRANCH//\//-}'
          extra_build_args: "--platform=linux/amd64"
          auth:
            - aws-cli/setup:
                region: ${AWS_DEFAULT_REGION}

  tag_billy_latest:
    docker:
      - image: cimg/aws:2022.06.1
    steps:
      - aws-cli/setup:
          region: ${AWS_DEFAULT_REGION}
      - aws-ecr/ecr_login
      - aws-ecr/tag_image:
          repo: billy
          source_tag: "${CIRCLE_SHA1:0:7}"
          target_tag: "latest"

  tag_billy_production:
    docker:
      - image: cimg/aws:2022.06.1
    steps:
      - aws-cli/setup:
          region: ${AWS_DEFAULT_REGION}
      - aws-ecr/ecr_login
      - aws-ecr/tag_image:
          repo: billy
          source_tag: "${CIRCLE_SHA1:0:7}"
          target_tag: "production"

  deploy_billy_production:
    docker:
      - image: cimg/aws:2023.09
    circleci_ip_ranges: true
    steps:
      - checkout
      - aws-cli/setup:
          region: ${AWS_DEFAULT_REGION}
      - run:
          name: Install kubectl
          command: |
            curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
            sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
      - run:
          name: Configure kubeconfig for Billy deployment
          command: |
            CLUSTER_NAME="${BILLY_EKS_CLUSTER_NAME:-${EKS_CLUSTER_NAME:-prod-mirror-application}}"

            aws eks update-kubeconfig \
              --name "${CLUSTER_NAME}" \
              --region "${AWS_DEFAULT_REGION}" \
              --role-arn arn:aws:iam::277411487094:role/k8sAdmin
      - run:
          name: Deploy Billy production image
          command: |
            NAMESPACE="${BILLY_K8S_NAMESPACE:-billy}"
            DEPLOYMENT="${BILLY_K8S_DEPLOYMENT:-billy}"
            ACCOUNT_ID="${AWS_ACCOUNT_ID}"
            REGION="${AWS_DEFAULT_REGION}"
            IMAGE="${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/billy:${CIRCLE_SHA1:0:7}"

            kubectl -n "${NAMESPACE}" set image deployment/"${DEPLOYMENT}" billy="${IMAGE}"
            kubectl -n "${NAMESPACE}" rollout status deployment/"${DEPLOYMENT}" --timeout=5m

  tag_hosted_public_latest:
    docker:
      - image: cimg/aws:2022.06.1
    steps:
      - aws-cli/setup:
          region: ${AWS_DEFAULT_REGION}
      - aws-ecr/ecr_login
      - aws-ecr/tag_image:
          repo: finout-mcp
          source_tag: "${CIRCLE_SHA1:0:7}"
          target_tag: "latest"

  publish_python_packages:
    executor: python
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Optional publish to PyPI (main only)
          command: |
            if [ "${CIRCLE_BRANCH}" != "main" ]; then
              echo "Skipping PyPI publish on non-main branch."
              exit 0
            fi
            if [ -z "${PYPI_API_TOKEN:-}" ]; then
              echo "Skipping PyPI publish (PYPI_API_TOKEN not set)."
              exit 0
            fi

            python -m pip install --upgrade pip twine
            export TWINE_USERNAME="__token__"
            export TWINE_PASSWORD="${PYPI_API_TOKEN}"
            python -m twine upload --skip-existing dist/mcp-server/*

workflows:
  ci_cd:
    jobs:
      - mcp_quality
      - billy_quality
      - build_python_packages:
          requires:
            - mcp_quality
            - billy_quality
      - smoke_test_python_packages:
          requires:
            - build_python_packages
      - build_and_push_billy_image:
          context: finout
          requires:
            - smoke_test_python_packages
      - build_and_push_hosted_public_image:
          context: finout
          requires:
            - smoke_test_python_packages
      - tag_billy_latest:
          context: finout
          requires:
            - build_and_push_billy_image
          filters:
            branches:
              only: main
      - tag_billy_production:
          context: finout
          requires:
            - build_and_push_billy_image
          filters:
            branches:
              only: main
      - deploy_billy_production:
          context: finout
          requires:
            - tag_billy_production
          filters:
            branches:
              only: main
      - tag_hosted_public_latest:
          context: finout
          requires:
            - build_and_push_hosted_public_image
          filters:
            branches:
              only: main
      - publish_python_packages:
          requires:
            - smoke_test_python_packages
